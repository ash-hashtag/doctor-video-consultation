version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: sehaat_saathi_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - sehaat_saathi_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sehaat_saathi_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/video-consultation
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - sehaat_saathi_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sehaat_saathi_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - sehaat_saathi_network

volumes:
  mongo_data:

networks:
  sehaat_saathi_network:
    driver: bridge
